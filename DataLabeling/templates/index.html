<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Labeling</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 14px 12px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #7c85a2;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    #sidebar-stats {
      padding: 8px 12px;
      font-size: 12px;
      color: #7c85a2;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    #example-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .example-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #a0aec0;
      border-left: 3px solid transparent;
    }
    .example-item:hover { background: #20243a; color: #e2e8f0; }
    .example-item.active { background: #20243a; border-left-color: #6366f1; color: #e2e8f0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.labeled   { background: #22c55e; }
    .dot.unlabeled { background: #4b5563; }
    .example-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Main ──────────────────────────────────── */
    #main { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    #topbar {
      padding: 10px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #current-name { font-size: 15px; font-weight: 600; color: #e2e8f0; flex: 1; }
    .nav-btn {
      background: #2d3148;
      border: none;
      color: #a0aec0;
      padding: 5px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }
    .nav-btn:hover:not(:disabled) { background: #3d4168; color: #e2e8f0; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }

    #content-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Cards ─────────────────────────────────── */
    .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .card-header {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #7c85a2;
      border-bottom: 1px solid #2d3148;
      background: #161923;
    }
    .card-body { padding: 14px 16px; }
    #task-text { line-height: 1.6; color: #cbd5e1; }

    /* ── Screenshots ───────────────────────────── */
    #screenshots-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-shrink: 0; }
    .screenshot-wrap {
      cursor: zoom-in;
      border-radius: 4px;
      overflow: hidden;
      background: #0f1117;
      min-height: 80px;
    }
    .screenshot-wrap img { width: 100%; height: auto; display: block; }

    /* ── Zoom modal ─────────────────────────────── */
    #zoom-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #zoom-modal.open { display: flex; }
    #zoom-img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 6px; }

    /* ── Diff ───────────────────────────────────── */
    .diff-table {
      width: 100%;
      border-collapse: collapse;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .diff-table td { padding: 1px 8px; white-space: pre-wrap; word-break: break-all; vertical-align: top; }
    .diff-table td.ln { color: #4b5563; width: 1%; min-width: 36px; text-align: right; user-select: none; border-right: 1px solid #2d3148; padding-right: 10px; }
    .diff-line-add  { background: #0d2b1a; color: #86efac; }
    .diff-line-add td.ln  { background: #0a2015; color: #4b8c63; }
    .diff-line-del  { background: #2b0d0d; color: #fca5a5; }
    .diff-line-del td.ln  { background: #220a0a; color: #8c4b4b; }
    .diff-line-hunk { background: #161e30; color: #6b9bcf; font-style: italic; }
    .diff-line-hunk td { padding: 3px 8px; }
    .diff-line-ctx  { color: #94a3b8; }
    .diff-line-ctx td.ln { color: #374151; }
    .diff-empty { padding: 14px 16px; color: #4b5563; font-style: italic; }

    /* inline change highlights */
    .diff-line-add .hi  { background: #166534; border-radius: 2px; }
    .diff-line-del .hi  { background: #7f1d1d; border-radius: 2px; }

    /* ── Label form ─────────────────────────────── */
    #verdict-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .verdict-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #2d3148;
      border-radius: 7px;
      background: #161923;
      color: #a0aec0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .06em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .verdict-btn:hover { border-color: #6366f1; color: #e2e8f0; }
    .verdict-btn.pass.selected { background: #14532d; border-color: #22c55e; color: #86efac; }
    .verdict-btn.fail.selected { background: #4c0519; border-color: #ef4444; color: #fca5a5; }
    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: #7c85a2;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.55;
      padding: 10px 12px;
      resize: vertical;
      font-family: inherit;
      min-height: 80px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #6366f1; }
    .field-group { margin-bottom: 14px; }
    #save-row { display: flex; align-items: center; gap: 14px; margin-top: 4px; }
    #save-btn {
      background: #6366f1;
      border: none;
      color: #fff;
      padding: 9px 28px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #save-btn:hover { background: #4f52d0; }
    #save-btn:disabled { background: #3d4168; cursor: default; }
    #save-status { font-size: 13px; color: #22c55e; opacity: 0; transition: opacity 0.3s; }
    #save-status.visible { opacity: 1; }
    #save-status.error { color: #ef4444; }

    #empty-state { display: flex; align-items: center; justify-content: center; flex: 1; color: #4b5563; font-size: 15px; }

    #kb-hint { font-size: 11px; color: #4b5563; padding: 8px 20px; flex-shrink: 0; }
    kbd { background: #2d3148; border-radius: 3px; padding: 1px 5px; font-size: 11px; color: #a0aec0; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">Examples</div>
  <div id="sidebar-stats">Loading...</div>
  <div id="example-list"></div>
</div>

<div id="main">
  <div id="topbar">
    <button class="nav-btn" id="prev-btn" disabled>← Prev</button>
    <span id="current-name">Select an example</span>
    <button class="nav-btn" id="next-btn" disabled>Next →</button>
  </div>

  <div id="content-area">
    <div id="empty-state">← Select an example to begin</div>
  </div>

  <div id="kb-hint">
    <kbd>P</kbd> PASS &nbsp; <kbd>F</kbd> FAIL &nbsp; <kbd>Ctrl S</kbd> Save &nbsp;
    <kbd>←</kbd> <kbd>→</kbd> Navigate &nbsp; <kbd>Esc</kbd> Close zoom
  </div>
</div>

<div id="zoom-modal">
  <img id="zoom-img" src="" alt="" />
</div>

<script>
  // ── Diff renderer with character-level highlighting ────────
  function renderDiff(diffText) {
    if (!diffText || !diffText.trim()) {
      return '<div class="diff-empty">No diff available.</div>';
    }

    // For a pair of changed lines, find the differing middle span and wrap it in <span class="hi">.
    function intraLineDiff(oldStr, newStr) {
      let p = 0;
      while (p < oldStr.length && p < newStr.length && oldStr[p] === newStr[p]) p++;
      let os = oldStr.length, ns = newStr.length;
      while (os > p && ns > p && oldStr[os - 1] === newStr[ns - 1]) { os--; ns--; }
      const prefix = escHtml(oldStr.slice(0, p));
      const suffix = escHtml(oldStr.slice(os));
      const newSuffix = escHtml(newStr.slice(ns));
      const oldMid = escHtml(oldStr.slice(p, os));
      const newMid = escHtml(newStr.slice(p, ns));
      return {
        del: prefix + (oldMid ? `<span class="hi">${oldMid}</span>` : '') + suffix,
        add: prefix + (newMid ? `<span class="hi">${newMid}</span>` : '') + newSuffix,
      };
    }

    const lines = diffText.split('\n');
    let html = '<table class="diff-table"><tbody>';
    let addLineNo = 0, delLineNo = 0;
    let i = 0;

    function parseHunk(line) {
      const m = line.match(/^@@\s*-(\d+)(?:,\d+)?\s*\+(\d+)(?:,\d+)?\s*@@/);
      if (m) { delLineNo = parseInt(m[1]) - 1; addLineNo = parseInt(m[2]) - 1; }
    }

    while (i < lines.length) {
      const line = lines[i];

      if (line.startsWith('--- ') || line.startsWith('+++ ')) { i++; continue; }

      if (line.startsWith('@@')) {
        parseHunk(line);
        html += `<tr class="diff-line-hunk"><td class="ln" colspan="2"></td><td>${escHtml(line)}</td></tr>`;
        i++;
        continue;
      }

      // Collect a contiguous block of deletions then additions for paired char-diff.
      if (line.startsWith('-') || line.startsWith('+')) {
        const delLines = [], addLines = [];
        while (i < lines.length && lines[i].startsWith('-')) { delLines.push(lines[i].slice(1)); i++; }
        while (i < lines.length && lines[i].startsWith('+')) { addLines.push(lines[i].slice(1)); i++; }

        const pairCount = Math.min(delLines.length, addLines.length);

        // Precompute char diffs for paired lines.
        const diffs = [];
        for (let j = 0; j < pairCount; j++) diffs.push(intraLineDiff(delLines[j], addLines[j]));

        for (let j = 0; j < delLines.length; j++) {
          delLineNo++;
          const content = j < pairCount ? diffs[j].del : escHtml(delLines[j]);
          html += `<tr class="diff-line-del"><td class="ln">${delLineNo}</td><td class="ln"></td><td>${content}</td></tr>`;
        }
        for (let j = 0; j < addLines.length; j++) {
          addLineNo++;
          const content = j < pairCount ? diffs[j].add : escHtml(addLines[j]);
          html += `<tr class="diff-line-add"><td class="ln"></td><td class="ln">${addLineNo}</td><td>${content}</td></tr>`;
        }
        continue;
      }

      // Context line.
      delLineNo++; addLineNo++;
      html += `<tr class="diff-line-ctx"><td class="ln">${delLineNo}</td><td class="ln">${addLineNo}</td><td>${escHtml(line.slice(1))}</td></tr>`;
      i++;
    }

    html += '</tbody></table>';
    return html;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── State ───────────────────────────────────────────────────
  let examples = [];
  let currentIndex = -1;

  // ── Init ────────────────────────────────────────────────────
  async function init() {
    const res = await fetch('/api/examples');
    examples  = await res.json();
    renderSidebar();
    if (examples.length > 0) selectExample(0);
  }

  // ── Sidebar ─────────────────────────────────────────────────
  function renderSidebar() {
    const list   = document.getElementById('example-list');
    const labeled = examples.filter(e => e.labeled).length;
    document.getElementById('sidebar-stats').textContent = `${labeled} / ${examples.length} labeled`;

    list.innerHTML = '';
    examples.forEach((ex, i) => {
      const item = document.createElement('div');
      item.className = 'example-item' + (i === currentIndex ? ' active' : '');
      item.dataset.index = i;
      item.innerHTML = `<span class="dot ${ex.labeled ? 'labeled' : 'unlabeled'}"></span>
                        <span class="example-name">${escHtml(ex.name)}</span>`;
      item.addEventListener('click', () => selectExample(i));
      list.appendChild(item);
    });
  }

  function refreshSidebarItem(index) {
    const item = document.querySelector(`.example-item[data-index="${index}"]`);
    if (!item) return;
    item.querySelector('.dot').className = 'dot ' + (examples[index].labeled ? 'labeled' : 'unlabeled');
    const labeled = examples.filter(e => e.labeled).length;
    document.getElementById('sidebar-stats').textContent = `${labeled} / ${examples.length} labeled`;
  }

  // ── Load example ─────────────────────────────────────────────
  async function selectExample(index) {
    currentIndex = index;

    // Update nav buttons and title.
    document.getElementById('prev-btn').disabled = index === 0;
    document.getElementById('next-btn').disabled = index === examples.length - 1;
    document.getElementById('current-name').textContent = examples[index].name;

    // Update sidebar active state.
    document.querySelectorAll('.example-item').forEach((el, i) =>
      el.classList.toggle('active', i === index));
    document.querySelector(`.example-item[data-index="${index}"]`)
      ?.scrollIntoView({ block: 'nearest' });

    const area = document.getElementById('content-area');
    area.innerHTML = '<div id="empty-state">Loading...</div>';

    const res  = await fetch(`/api/example/${examples[index].name}`);
    const data = await res.json();

    renderContent(data);
  }

  // ── Render content ───────────────────────────────────────────
  function renderContent(data) {
    const area = document.getElementById('content-area');

    // Task card.
    const taskCard = makeCard('Task', `<div id="task-text" class="card-body"></div>`);

    // Screenshots card.
    const screenshotsHtml = `
      <div id="screenshots-row">
        <div class="card">
          <div class="card-header">Before</div>
          <div class="card-body" style="padding:8px">
            <div class="screenshot-wrap" data-src="/api/example/${data.name}/image/before">
              <img src="/api/example/${data.name}/image/before" alt="Before" loading="lazy" />
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">After</div>
          <div class="card-body" style="padding:8px">
            <div class="screenshot-wrap" data-src="/api/example/${data.name}/image/after">
              <img src="/api/example/${data.name}/image/after" alt="After" loading="lazy" />
            </div>
          </div>
        </div>
      </div>`;

    // Diff card.
    const diffCard = makeCard('Code Diff',
      `<div style="overflow-x:auto">${renderDiff(data.diff)}</div>`, false);

    // Label card.
    const labelCard = makeCard('Label', `
      <div class="card-body">
        <div id="verdict-row">
          <button class="verdict-btn pass" id="pass-btn">PASS</button>
          <button class="verdict-btn fail" id="fail-btn">FAIL</button>
        </div>
        <div class="field-group">
          <div class="field-label">Code Reasoning</div>
          <textarea id="code-reasoning" rows="3"
            placeholder="Describe what the diff shows and whether it correctly implements the task..."></textarea>
        </div>
        <div class="field-group">
          <div class="field-label">Image Reasoning</div>
          <textarea id="image-reasoning" rows="3"
            placeholder="Describe what you observe in the screenshots and whether the change is visible..."></textarea>
        </div>
        <div id="save-row">
          <button id="save-btn">Save</button>
          <span id="save-status"></span>
        </div>
      </div>`, false);

    area.innerHTML = '';
    area.insertAdjacentHTML('beforeend', taskCard);
    area.insertAdjacentHTML('beforeend', screenshotsHtml);
    area.insertAdjacentHTML('beforeend', diffCard);
    area.insertAdjacentHTML('beforeend', labelCard);

    // Populate task text safely.
    document.getElementById('task-text').textContent = data.task;

    // Populate textareas safely.
    document.getElementById('code-reasoning').value  = data.code_reasoning  || '';
    document.getElementById('image-reasoning').value = data.image_reasoning || '';

    // Set verdict.
    if (data.verdict === 'PASS') setVerdict('PASS');
    else if (data.verdict === 'FAIL') setVerdict('FAIL');

    // Wire buttons.
    document.getElementById('pass-btn').addEventListener('click', () => setVerdict('PASS'));
    document.getElementById('fail-btn').addEventListener('click', () => setVerdict('FAIL'));
    document.getElementById('save-btn').addEventListener('click', saveLabel);

    // Wire screenshot zoom.
    document.querySelectorAll('.screenshot-wrap').forEach(wrap =>
      wrap.addEventListener('click', () => openZoom(wrap.dataset.src)));
  }

  function makeCard(title, bodyHtml, wrapInCardBody = true) {
    const body = wrapInCardBody
      ? `<div class="card-body">${bodyHtml}</div>`
      : bodyHtml;
    return `<div class="card"><div class="card-header">${escHtml(title)}</div>${body}</div>`;
  }

  // ── Verdict ──────────────────────────────────────────────────
  function setVerdict(v) {
    document.getElementById('pass-btn')?.classList.toggle('selected', v === 'PASS');
    document.getElementById('fail-btn')?.classList.toggle('selected', v === 'FAIL');
  }

  function getVerdict() {
    if (document.getElementById('pass-btn')?.classList.contains('selected')) return 'PASS';
    if (document.getElementById('fail-btn')?.classList.contains('selected')) return 'FAIL';
    return '';
  }

  // ── Save ─────────────────────────────────────────────────────
  async function saveLabel() {
    const verdict         = getVerdict();
    const code_reasoning  = document.getElementById('code-reasoning')?.value.trim()  || '';
    const image_reasoning = document.getElementById('image-reasoning')?.value.trim() || '';
    const statusEl        = document.getElementById('save-status');
    const saveBtn         = document.getElementById('save-btn');

    if (!verdict) {
      statusEl.textContent = 'Select PASS or FAIL first.';
      statusEl.className   = 'error visible';
      setTimeout(() => statusEl.className = '', 2500);
      return;
    }

    saveBtn.disabled = true;
    const res = await fetch(`/api/example/${examples[currentIndex].name}/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ verdict, code_reasoning, image_reasoning }),
    });
    saveBtn.disabled = false;

    if (res.ok) {
      examples[currentIndex].labeled = true;
      refreshSidebarItem(currentIndex);
      statusEl.textContent = 'Saved!';
      statusEl.className   = 'visible';
      setTimeout(() => statusEl.className = '', 2000);
    } else {
      statusEl.textContent = 'Save failed.';
      statusEl.className   = 'error visible';
      setTimeout(() => statusEl.className = '', 2500);
    }
  }

  // ── Zoom ─────────────────────────────────────────────────────
  function openZoom(src) {
    document.getElementById('zoom-img').src = src;
    document.getElementById('zoom-modal').classList.add('open');
  }
  document.getElementById('zoom-modal').addEventListener('click', () =>
    document.getElementById('zoom-modal').classList.remove('open'));

  // ── Navigation ───────────────────────────────────────────────
  document.getElementById('prev-btn').addEventListener('click', () => {
    if (currentIndex > 0) selectExample(currentIndex - 1);
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    if (currentIndex < examples.length - 1) selectExample(currentIndex + 1);
  });

  // ── Keyboard shortcuts ───────────────────────────────────────
  document.addEventListener('keydown', e => {
    const inInput = ['textarea','input'].includes(document.activeElement.tagName.toLowerCase());

    if (!inInput) {
      if (e.key === 'p' || e.key === 'P') { e.preventDefault(); setVerdict('PASS'); }
      if (e.key === 'f' || e.key === 'F') { e.preventDefault(); setVerdict('FAIL'); }
      if (e.key === 'ArrowRight') { e.preventDefault(); document.getElementById('next-btn').click(); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); document.getElementById('prev-btn').click(); }
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveLabel(); }
    if (e.key === 'Escape') document.getElementById('zoom-modal').classList.remove('open');
  });

  init();
</script>
</body>
</html>
