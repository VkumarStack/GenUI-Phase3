<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 400px;
    }

    label {
      font-weight: bold;
    }

    input[type="text"],
    input[type="email"] {
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* Submit button is left-aligned because the form uses flex-direction: column
       and align-items defaults to stretch, but the button has a fixed width so
       it naturally sits on the left. */
    button[type="submit"] {
      width: fit-content;
      padding: 8px 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <h2>Contact Us</h2>
  <form>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Jane Doe">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="jane@example.com">

    <label for="message">Message</label>
    <input type="text" id="message" name="message" placeholder="Your message here">

    <button type="submit">Submit</button>
  </form>
</body>
</html>
