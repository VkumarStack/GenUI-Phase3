<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Street View</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
  }

  .image-card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 16/10;
  }

  .image-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .image-card .overlay {
    position: absolute;
    top: 0; /* Changed from bottom: 0; */
    left: 0;
    right: 0;
    bottom: 0; /* Added to cover the entire card for full centering */
    display: flex;
    flex-direction: column; /* Stack items vertically */
    justify-content: center; /* Center content vertically */
    align-items: center; /* Center content horizontally */
    padding: 14px; /* Adjusted padding for overall centering */
    background: rgba(0,0,0,0.4); /* Changed to a semi-transparent solid overlay for better text readability */
  }

  .image-card .overlay .label {
    color: #fff;
    font-size: 2.2rem; /* Increased font size */
    font-weight: 700; /* Increased font weight for prominence */
    text-align: center; /* Ensure text is centered */
    line-height: 1.1; /* Adjust line height for larger text */
  }

  .image-card .overlay .search-link {
    color: #fff;
    font-size: 0.8rem; /* Decreased font size */
    text-decoration: underline;
    cursor: pointer;
    margin-top: 8px; /* Added margin to place it below the main text */
    text-align: center; /* Ensure text is centered */
  }

  .pro-badge {
    background: #2196F3;
    border-radius: 20px;
    padding: 4px 16px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #fff;
    font-weight: 700;
    font-size: 0.85rem;
  }

  .clock-card {
    border-radius: 12px;
    overflow: hidden;
    background: linear-gradient(135deg, #2c3e50, #1a1a2e);
    padding: 16px 8px;
  }

  .clock-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .clock-container .city-name {
    color: #ccc;
    font-size: 0.7rem;
    font-weight: 500;
  }

  .clock-container .time-text {
    color: #999;
    font-size: 0.6rem;
    margin-top: 2px;
  }

  .clock-face {
    width: 72px;
    height: 72px;
  }
</style>
</head>
