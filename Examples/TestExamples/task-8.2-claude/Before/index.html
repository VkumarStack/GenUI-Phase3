<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRM ART</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poiret+One&display=swap');

  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
  }

  .app-title {
    font-family: 'Poiret One', cursive;
    font-size: 3rem;
    letter-spacing: 0.15em;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .app-title sup {
    font-size: 0.4em;
    vertical-align: super;
    margin-left: 2px;
  }

  .icon-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  .icon-btn span {
    font-size: 0.8rem;
    letter-spacing: 0.03em;
  }

  .icon-box {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-box svg {
    width: 48px;
    height: 48px;
    stroke: #fff;
    stroke-width: 1.5;
    fill: none;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
  }

  .shop-icon svg {
    width: 36px;
    height: 36px;
    stroke: #fff;
    stroke-width: 1.5;
    fill: none;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
  }
</style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto border-x border-slate-200 dark:border-slate-800">

  <!-- Background image -->
  <div class="absolute inset-0 z-0">
    <img
      src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=800&q=80"
      alt="London street with buses and taxis"
      class="w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-black/20"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 flex flex-col flex-1 min-h-screen">

    <!-- Top-left shop icon -->
    <div class="p-4 shop-icon">
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <!-- Shop/store icon -->
        <rect x="5" y="16" width="26" height="16" rx="1" />
        <polyline points="5,16 8,4 28,4 31,16" />
        <line x1="11" y1="16" x2="11" y2="10" />
        <line x1="18" y1="16" x2="18" y2="10" />
        <line x1="25" y1="16" x2="25" y2="10" />
        <path d="M5,16 C5,12 11,12 11,16" />
        <path d="M11,16 C11,12 18,12 18,16" />
        <path d="M18,16 C18,12 25,12 25,16" />
        <path d="M25,16 C25,12 31,12 31,16" />
        <rect x="14" y="24" width="8" height="8" />
      </svg>
    </div>

    <!-- App title -->
    <div class="flex justify-center mt-4 mb-auto">
      <h1 class="app-title">FRM ART<sup>&reg;</sup></h1>
    </div>

    <!-- Icon grid - vertically centered-ish in lower half -->
    <div class="flex-1 flex items-center justify-center px-6">
      <div class="grid grid-cols-3 gap-x-12 gap-y-6">

        <!-- Camera -->
        <div class="icon-btn">
          <div class="icon-box">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="12" width="40" height="28" rx="3" />
              <path d="M16,12 L18,6 L30,6 L32,12" />
              <circle cx="24" cy="26" r="8" />
              <circle cx="24" cy="26" r="4" />
            </svg>
          </div>
          <span>Camera</span>
        </div>

        <!-- Photo -->
        <div class="icon-btn">
          <div class="icon-box">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="8" width="40" height="32" rx="2" />
              <polyline points="4,34 16,22 28,34" />
              <polyline points="24,30 34,20 44,30" />
              <circle cx="34" cy="16" r="3" />
            </svg>
          </div>
          <span>Photo</span>
        </div>

        <!-- Collage -->
        <div class="icon-btn">
          <div class="icon-box">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="4" width="40" height="40" rx="2" />
              <line x1="4" y1="4" x2="44" y2="44" />
              <line x1="44" y1="4" x2="4" y2="44" />
            </svg>
          </div>
          <span>Collage</span>
        </div>

        <!-- Slim Body -->
        <div class="icon-btn">
          <div class="icon-box">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <rect x="8" y="4" width="32" height="40" rx="2" />
              <path d="M18,14 C18,14 16,20 16,24 C16,28 20,32 24,32 C28,32 32,28 32,24 C32,20 30,14 30,14" />
              <line x1="12" y1="20" x2="16" y2="22" />
              <line x1="36" y1="20" x2="32" y2="22" />
              <path d="M20,14 C20,12 22,10 24,10 C26,10 28,12 28,14" />
            </svg>
          </div>
          <span>Slim Body</span>
        </div>

        <!-- Gallery -->
        <div class="icon-btn">
          <div class="icon-box">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="12" width="32" height="28" rx="2" />
              <rect x="10" y="6" width="32" height="28" rx="2" />
              <polyline points="10,28 20,18 30,28" />
              <circle cx="30" cy="14" r="3" />
            </svg>
          </div>
          <span>Gallery</span>
        </div>

        <!-- Share instant -->
        <div class="icon-btn">
          <div class="icon-box">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <rect x="4" y="8" width="40" height="32" rx="2" />
              <circle cx="34" cy="16" r="4" />
              <circle cx="16" cy="24" r="4" />
              <circle cx="34" cy="32" r="4" />
              <line x1="20" y1="22" x2="30" y2="18" />
              <line x1="20" y1="26" x2="30" y2="30" />
            </svg>
          </div>
          <span>Share instant</span>
        </div>

      </div>
    </div>

    <!-- Bottom spacer to push icons up a bit -->
    <div class="h-24"></div>

  </div>
</div>

</body>
</html>
