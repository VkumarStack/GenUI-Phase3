<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPlate - Livestrong</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
  }

  .brand-sub {
    font-family: sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: #fff;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }

  .brand-main {
    font-family: sans-serif;
    font-size: 2.4rem;
    font-weight: 300;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    letter-spacing: 0.02em;
  }

  .google-btn {
    background: #fff;
    border: none;
    border-radius: 4px;
    padding: 14px 20px;
    width: 100%;
    display: flex;
    align-items: center;
    color: #555;
    font-family: sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    position: relative;
  }

  .google-btn .g-icon {
    position: absolute;
    left: 16px;
  }

  .google-btn .g-label {
    flex: 1;
    text-align: center;
  }

  .fb-btn {
    background: #4267B2;
    border: none;
    border-radius: 4px;
    padding: 14px 20px;
    width: 100%;
    display: flex;
    align-items: center;
    color: #fff;
    font-family: sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    position: relative;
  }

  .fb-btn .fb-icon {
    position: absolute;
    left: 16px;
    font-size: 1.3rem;
    font-weight: 700;
  }

  .fb-btn .fb-label {
    flex: 1;
    text-align: center;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff; /* Adjusted from rgba(255,255,255,0.6) to white */
    font-family: sans-serif;
    font-size: 0.85rem;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #fff; /* Adjusted from rgba(255,255,255,0.3) to white */
  }

  .login-btn, .signup-btn {
    flex: 1;
    border: none;
    border-radius: 4px;
    padding: 14px 16px;
    font-family: sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .login-btn {
    background: rgba(160, 160, 160, 0.7);
    color: #fff;
  }

  .signup-btn {
    background: rgba(90, 100, 110, 0.85);
    color: #fff;
  }
</style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200 dark:border-slate-800">

  <!-- Background image -->
  <div class="absolute inset-0 z-0">
    <img
      src="https://images.unsplash.com/photo-1606923829579-0cb981a83e2e?w=800&q=80"
      alt="Fresh vegetables on dark wooden table"
      class="w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-black/25"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 flex flex-col flex-1 min-h-screen px-6">

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Logo circle -->
    <div class="flex justify-center mb-4">
      <div class="w-[130px] h-[130px] rounded-full bg-white flex items-center justify-center shadow-lg">
        <div class="w-[116px] h-[116px] rounded-full flex items-center justify-center" style="background: #ef8a72;">
          <svg width="60" height="60" viewBox="0 0 60 60" fill="#fff" xmlns="http://www.w3.org/2000/svg">
            <!-- Fork -->
            <g transform="translate(12, 8) rotate(0)">
              <rect x="6" y="20" width="3" height="24" rx="1.5" />
              <rect x="2" y="4" width="2" height="14" rx="1" />
              <rect x="6.5" y="4" width="2" height="14" rx="1" />
              <rect x="11" y="4" width="2" height="14" rx="1" />
              <ellipse cx="7.5" cy="18" rx="6" ry="4" />
            </g>
            <!-- Knife -->
            <g transform="translate(34, 8)">
              <rect x="4" y="18" width="3" height="26" rx="1.5" />
              <path d="M5.5 2C5.5 2 10 6 10 14C10 18 8 20 5.5 20C3 20 1 18 1 14C1 6 5.5 2 5.5 2Z" />
            </g>
          </svg>
        </div>
      </div>
    </div>

    <!-- Brand text -->
    <div class="text-center mb-1">
      <p class="brand-sub">Livestrong.com</p>
    </div>
    <div class="text-center mb-8">
      <p class="brand-main">MyPlate</p>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Google button -->
    <button class="google-btn">
      <span class="g-icon">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
      </span>
      <span class="g-label">Sign in with Google</span>
    </button>

    <!-- Facebook button -->
    <button class="fb-btn mt-3">
      <span class="fb-icon">f</span>
      <span class="fb-label">Log in with Facebook</span>
    </button>

    <!-- Divider -->
    <div class="divider mt-3">or</div>

    <!-- Login / Sign Up row -->
    <div class="flex gap-3 mt-3 mb-6">
      <button class="login-btn">LOGIN</button>
      <button class="signup-btn">SIGN UP</button>
    </div>

  </div>
</div>

</body>
</html>
