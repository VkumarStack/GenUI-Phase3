<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Planner</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
  }

  .card-btn {
    /* Changed from rgba(198, 57, 50, 0.82) to fully opaque #C63932 */
    background: #C63932;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 12px 20px;
    color: #fff;
    gap: 10px;
    cursor: pointer;
  }

  .card-btn svg {
    width: 56px;
    height: 56px;
    stroke: #fff;
    stroke-width: 2;
    fill: none;
  }

  .card-btn span {
    font-family: sans-serif;
    /* Increased text size from 0.85rem to 1.25rem */
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .toolbar-icon {
    width: 28px;
    height: 28px;
    stroke: #fff;
    stroke-width: 2;
    fill: none;
  }
</style>
</head>
<body>

<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto border-x border-slate-200 dark:border-slate-800 bg-gray-900">

  <!-- Top App Bar -->
  <div class="relative z-20 flex items-center px-4 py-3 bg-[#3d3d5c] shadow-md" style="background: #3a3a58;">
    <!-- Hamburger -->
    <div class="mr-3 cursor-pointer">
      <svg class="toolbar-icon" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
        <line x1="4" y1="7" x2="24" y2="7" />
        <line x1="4" y1="14" x2="24" y2="14" />
        <line x1="4" y1="21" x2="24" y2="21" />
      </svg>
    </div>

    <!-- Title -->
    <div class="flex-1 text-center">
      <span class="text-white text-lg font-medium tracking-wide" style="font-family: sans-serif;">Food Planner</span>
    </div>

    <!-- Sync icon (orange) -->
    <div class="mx-2 cursor-pointer">
      <svg class="toolbar-icon" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" stroke="#e8732a">
        <path d="M6,14 A8,8 0 0,1 22,14" />
        <polyline points="20,9 22,14 17,14" />
        <path d="M22,14 A8,8 0 0,1 6,14" />
        <polyline points="8,19 6,14 11,14" />
      </svg>
    </div>

    <!-- Help icon -->
    <div class="mx-2 cursor-pointer">
      <svg class="toolbar-icon" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="10" />
        <text x="14" y="18" text-anchor="middle" font-size="13" fill="#fff" stroke="none" font-family="sans-serif" font-weight="bold">?</text>
      </svg>
    </div>

    <!-- Bell icon -->
    <div class="ml-2 cursor-pointer">
      <svg class="toolbar-icon" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
        <path d="M10,22 C10,24 12,26 14,26 C16,26 18,24 18,22" />
        <path d="M6,22 L6,14 C6,9 9,5 14,5 C19,5 22,9 22,14 L22,22 Z" />
        <line x1="14" y1="2" x2="14" y2="5" />
      </svg>
    </div>
  </div>

  <!-- Main content area with background image -->
  <div class="relative flex-1 z-10">
    <!-- Background image -->
    <div class="absolute inset-0">
      <img
        src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=800&q=80"
        alt="Cooking - pouring water into pot"
        class="w-full h-full object-cover"
      />
      <div class="absolute inset-0 bg-black/40"></div>
    </div>

    <!-- Card Grid - Changed to 1 column per row -->
    <div class="relative z-10 grid grid-cols-1 gap-5 p-6 py-8">

      <!-- Row 1 -->
      <!-- Calendar -->
      <div class="card-btn">
        <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="10" width="34" height="32" rx="3" />
          <line x1="14" y1="6" x2="14" y2="14" />
          <line x1="32" y1="6" x2="32" y2="14" />
          <line x1="6" y1="18" x2="40" y2="18" />
          <line x1="14" y1="24" x2="14" y2="24.1" stroke-width="3" stroke-linecap="round" />
          <line x1="22" y1="24" x2="22" y2="24.1" stroke-width="3" stroke-linecap="round" />
          <line x1="30" y1="24" x2="30" y2="24.1" stroke-width="3" stroke-linecap="round" />
          <line x1="14" y1="30" x2="14" y2="30.1" stroke-width="3" stroke-linecap="round" />
          <line x1="22" y1="30" x2="22" y2="30.1" stroke-width="3" stroke-linecap="round" />
          <line x1="30" y1="30" x2="30" y2="30.1" stroke-width="3" stroke-linecap="round" />
          <line x1="14" y1="36" x2="14" y2="36.1" stroke-width="3" stroke-linecap="round" />
          <!-- Clock overlay - Changed fill to fully opaque #C63932 -->
          <circle cx="40" cy="36" r="12" fill="#C63932" stroke="#fff" stroke-width="2" />
          <line x1="40" y1="36" x2="40" y2="29" />
          <line x1="40" y1="36" x2="46" y2="36" />
        </svg>
        <span>Calendar</span>
      </div>

      <!-- Recipes -->
      <div class="card-btn">
        <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
          <path d="M12,6 L40,6 L44,10 L44,50 L12,50 Z" />
          <polyline points="36,6 36,14 44,14" />
          <line x1="18" y1="22" x2="36" y2="22" />
          <line x1="18" y1="28" x2="36" y2="28" />
          <line x1="18" y1="34" x2="36" y2="34" />
          <line x1="18" y1="40" x2="30" y2="40" />
        </svg>
        <span>Recipes</span>
      </div>

      <!-- Row 2 -->
      <!-- Groceries -->
      <div class="card-btn">
        <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
          <path d="M8,18 L14,18 L14,46 L42,46 L42,18 L48,18" />
          <rect x="14" y="18" width="28" height="28" rx="2" />
          <path d="M20,18 L20,12 C20,8 24,4 28,4 C32,4 36,8 36,12 L36,18" />
          <!-- Small list lines on bag -->
          <line x1="22" y1="28" x2="34" y2="28" />
          <line x1="22" y1="34" x2="34" y2="34" />
        </svg>
        <span>Groceries (0)</span>
      </div>

      <!-- Inventory -->
      <div class="card-btn">
        <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
          <!-- Box -->
          <rect x="8" y="14" width="30" height="28" rx="2" />
          <line x1="8" y1="22" x2="38" y2="22" />
          <rect x="18" y="18" width="12" height="8" rx="1" />
          <!-- Clipboard overlay -->
          <rect x="30" y="6" width="20" height="28" rx="2" />
          <rect x="36" y="3" width="8" height="6" rx="1" />
          <line x1="34" y1="16" x2="46" y2="16" />
          <line x1="34" y1="21" x2="46" y2="21" />
          <line x1="34" y1="26" x2="42" y2="26" />
        </svg>
        <span>Inventory</span>
      </div>

      <!-- Row 3 -->
      <!-- My Meal Plans -->
      <div class="card-btn">
        <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
          <!-- Chef hat -->
          <ellipse cx="28" cy="24" rx="14" ry="10" />
          <circle cx="16" cy="18" r="6" />
          <circle cx="40" cy="18" r="6" />
          <circle cx="28" cy="14" r="6" />
          <rect x="16" y="28" width="24" height="8" rx="1" />
          <!-- Heart -->
          <path d="M22,42 C22,39 25,37 28,40 C31,37 34,39 34,42 C34,46 28,50 28,50 C28,50 22,46 22,42 Z" fill="#fff" stroke="none" />
        </svg>
        <span>My Meal Plans</span>
      </div>

      <!-- FP Store -->
      <div class="card-btn">
        <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="24" width="36" height="24" rx="1" />
          <polyline points="10,24 14,10 42,10 46,24" />
          <!-- Awning scallops -->
          <path d="M10,24 C10,20 19,20 19,24" />
          <path d="M19,24 C19,20 28,20 28,24" />
          <path d="M28,24 C28,20 37,20 37,24" />
          <path d="M37,24 C37,20 46,20 46,24" />
          <!-- Door -->
          <rect x="22" y="34" width="12" height="14" rx="1" />
        </svg>
        <span>FP Store</span>
      </div>

    </div>
  </div>
</div>

</body>
</html>
